<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Display Property Example</title>

<style>

.common{
    border:2px solid #333;
    padding:12px;
    margin:10px;
    font-family:Arial, sans-serif;
}


.block-demo{
    display:block;
    background-color:rgb(94, 208, 224);
}


.inline-demo{
    display:inline;
    background-color:rgb(255, 182, 193);
    padding:8px;
}


.inlineblock-demo{
    display:inline-block;
    width:180px;
    height:70px;
    background-color:rgb(116, 116, 200);
    text-align:center;
    line-height:70px;
    color:white;
    margin-right:10px;
}


.hide{
    display:none;
}


.flex-box{
    display:flex;
    justify-content:space-around;
    border:2px solid rgb(122, 240, 122);
    padding:10px;
    margin-top:20px;
}

.card{
    background-color:rgb(43, 123, 227);
    border:1px solid rgb(255, 255, 255);
    padding:15px;
    width:100px;
    text-align:center;
}

</style>
</head>

<body>

<h2>Display: Block</h2>

<p class="common block-demo">Paragraph One</p>
<p class="common block-demo">Paragraph Two</p>

<hr>

<h2>Display: Inline</h2>

<a href="#" class="common inline-demo">Home</a>
<a href="#" class="common inline-demo">About</a>
<a href="#" class="common inline-demo">Contact</a>

<hr>

<h2>Display: Inline-Block</h2>

<div class="inlineblock-demo">Box A</div>
<div class="inlineblock-demo">Box B</div>

<hr>

<h2>Display: None</h2>

<div class="common">Visible Content</div>
<div class="common hide">This content is hidden.</div>
<div class="common">Another Visible Content</div>

<hr>

<h2>Display: Flex</h2>

<div class="flex-box">
    <div class="card">HTML</div>
    <div class="card">CSS</div>
    <div class="card">JavaScript</div>
</div>

</body>
</html>
