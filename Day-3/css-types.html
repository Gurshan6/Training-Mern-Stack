<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal and External CSS</title>

    <!-- Internal CSS -->
    <style>
        h1 {
            color: darkblue;
            text-align: center;
        }

        p {
            color: brown;
            font-size: 18px;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Internal CSS Example</h1>

    <p>This paragraph is styled using Internal CSS.</p>

    <div class="box">
        This box is styled using External CSS.
    </div>

</body>
</html>
