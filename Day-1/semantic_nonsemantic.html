<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic & Non-Semantic Tags</title>
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <section>
        <article>
            <h2>Semantic Tags</h2>
            <p>Semantic tags describe the meaning of content.</p>
        </article>
    </section>

    <footer>
        <p>Copyright © 2026 My Website</p>
    </footer>

    <hr>

    <div>
        <h2>Non-Semantic Tag (div)</h2>
        <span>This is inside a span element.</span>
    </div>

</body>
</html>
