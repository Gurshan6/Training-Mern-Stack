<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
    <style>
        table {
            border: 1px solid black;
            border-spacing: 3px;
            color: black;
            font-family: 'Times New Roman', Times, serif;
            text-align: left;
        }
        th, td {
            padding: 5px;
        }
    </style>
</head>
<body>

    <table border="1" cellspacing="3" cellpadding="5">
        <thead>
            <tr>
                <th>No.</th>
                <th>Fullname</th>
                <th>Position</th>
                <th>Salary</th>
                <th>Type</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Bill gates</td>
                <td>founder microsoft</td>
                <td>1000</td>
                <td rowspan="4" align="center" valign="middle">Company founder</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Steve jobs</td>
                <td>founder apple</td>
                <td>1200</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Larry page</td>
                <td>founder google</td>
                <td>1100</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Mark zuckerberg</td>
                <td>founder facebook</td>
                <td>1300</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                
                <td colspan="3">Total expenses:</td>
                <td>4600</td>
                <td></td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
