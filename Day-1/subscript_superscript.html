<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscript & Superscript</title>
</head>
<body>

    <h2>Subscript</h2>
    <p>Water: H<sub>2</sub>O</p>

    <h2>Superscript</h2>
    <p>x<sup>2</sup> + y<sup>2</sup></p>

</body>
